[[redirects]]
from = "https://www.cost-calculator.restaurantsynk.com/*"
to = "/cost-calculator/:splat"
status = 200
force = true

[[redirects]]
from = "http://www.cost-calculator.restaurantsynk.com/*"
to = "/cost-calculator/:splat"
status = 200
force = true

[[redirects]]
from = "https://cost-calculator.restaurantsynk.com/*"
to = "/cost-calculator/:splat"
status = 200
force = true

[[redirects]]
from = "http://cost-calculator.restaurantsynk.com/*"
to = "/cost-calculator/:splat"
status = 200
force = true

[[headers]]
for = "/*"
[headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/assets/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/cost-calculator/*"
[headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"
